- "@noampomsky: I think the most important thing to select for in a relationship is someone who is capable of giving and taking feedback well. bc most people are so bad at both that if they have an issue they can't voice it and if someone raises an issue to them they flip out. so every disagreement just ends up feeling hopeless bc there's this unbridgeable chasm between you and the other person that can't be crossed. In order to be able to give feedback well you have to 1) be aware of your needs and emotions 2) be able to articulate them in a kind and direct way 3) help the other person have empathy for where you're coming from and 4) understand they might not be at a place where they can act on what you're saying. In order to receive feedback well you need to 1) control your reactivity so you don't immediately lash out/reject the feedback 2) be able to model the other person's emotional world well enough to actually understand what they're pointing out 3) know yourself well enough in order to identify if you actually can or want to change and 4) be willing to actually think hard abt how you can change their experience, which might be really hard if they're pointing to something you're barely conscious of. Also in general you have to have a pretty good meta-model of what is even changeable about the other person bc some things you actually shouldn't give feedback on bc they can't change it or they're truly just not ready to hear it. Being able to give and accept feedback from other people and the world around you is the core trait that allows for psychological change and growth. People like to say \"people don't change\" but that's not true, people can radically change. However it's not straightforward at all and for most people it's actually healthier to model the person as unchanging—you should be able to accept them as they are and everything else is just gravy. But if you do want someone who is capable of growing along with you I think their relationship with feedback is the key thing to watch"
- "@TheVixhal: Building a Neural Network from Scratch in Pure x86-64 Assembly. Yeah, you read that right. We're doing this at the lowest level possible. In this article we're going to building a tiny XOR neural network in x86-64 assembly. No libraries. No shortcuts. Just you and the CPU. Prerequisites: You should know the basics of what a neural network is (layers, weights, biases, activation functions). Some assembly experience helps, but I'll explain things as we go. You'll need NASM and GCC installed on a Linux box. Table of Contents: The Game Plan, Quick Refresher: What Are We Actually Computing?, Setting Up: Data Section and Memory Layout, Step 1: The Forward Pass, Step 2: The Activation Function (Sigmoid), Step 3: Computing the Loss, Step 4: Backpropagation, Step 5: Weight Updates, Step 6: The Training Loop, Full Code Listing, Building and Running"
- "@trq212: Using Claude Code: Session Management & 1M Context. In my recent calls with Claude Code users, one theme keeps coming up: the 1M token context window is a double-edged sword. It lets Claude Code operate autonomously for longer and handle tasks more reliably, but it also opens the door to context pollution if you're not deliberate about managing your sessions. Session management matters more than ever and there seem to be a lot of questions about it. Do you keep one session open in a terminal, or two? Start fresh with every prompt? When should you use compact, rewind, or subagents? What causes a bad compact? There's a surprising amount of detail here that can really shape your experience with Claude Code and almost all of it comes from managing your context window. A Quick Primer on Context, Compaction & Context Rot: The context window is everything the model can \"see\" at once when generating its next response. It includes your system prompt, the conversation so far, every tool call and its output, and every file that's been read. Claude Code has a context window of one million tokens. Unfortunately using context has a slight cost, which is often called context rot. Context rot is the observation that model performance degrades as context grows because attention gets spread across more tokens, and older, irrelevant content starts to distract from the current task. For our 1MM context model, we see some level of context rot happen around ~300-400k tokens, but it is highly dependent on the task- not a fast rule. Context windows are a hard cutoff, so when you're nearing the end of the context window, you will need to summarize the task you've been working on into a smaller description and continue the work in a new context window, we call this compaction. You can also trigger compaction yourself."
