- "@phokarlsson: When I read lively prose, one thing I notice is that it packs a lot of information per sentence—but not, usually, by being compact. Instead, how to explain it?
  Take this phrase \"an interesting and exciting new finding\"—that's pretty dead. And one of several reasons is that the word \"exciting\" is sort of implicated by the word \"interesting\". They are not synonyms, but if I had blanked \"exciting\" and asked you, or a language model, to fill it in, \"exciting\" would have a high probability. So it is not adding all that much information—the reader already have that adjective implicitly in their head.
  A better writer would have either dropped one (or both) of the adjective(s). OR they would have found a second one that was true, important, and not predicted by the first. Lets see if I can make a decent example: \"an interesting and annoying new finding.\" Ok, not great. But you get the point.
  In good prose, there is a feeling that the writer keeps track of the predictions the reader makes and then goes, \"Fine, then I don't need to say that, but can add something new.\" It creates lively, information rich, yet not compact and hard-to-read prose."
