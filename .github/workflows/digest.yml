name: Daily X Digest

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore existing digests from gh-pages
        run: |
          mkdir -p output
          if git fetch origin gh-pages 2>/dev/null; then
            git ls-tree --name-only origin/gh-pages | while read f; do
              git show "origin/gh-pages:$f" > "output/$f" 2>/dev/null || true
            done
            echo "Restored $(ls output/*.html 2>/dev/null | wc -l | tr -d ' ') existing digest files"
          else
            echo "gh-pages branch not found (first run)"
          fi

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync

      - name: Run digest
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run src/digest.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/last_run.json
          git diff --staged --quiet || git commit -m "chore: advance last_run_at after successful digest"
          git push
